name: mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_dotenv: ^5.1.0
  flutter_native_splash: ^2.4.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  url_launcher: ^6.3.2
  local_auth: ^2.1.7
  qr_flutter: ^4.1.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/velau.png
    - .env

  fonts:
    - family: Satoshi
      fonts:
        - asset: Fonts/OTF/Satoshi-Regular.otf
        - asset: Fonts/OTF/Satoshi-Bold.otf
          weight: 700
        - asset: Fonts/OTF/Satoshi-Black.otf
          weight: 900
        - asset: Fonts/OTF/Satoshi-Light.otf
          weight: 300
        - asset: Fonts/OTF/Satoshi-Medium.otf
          weight: 500
        - asset: Fonts/OTF/Satoshi-Italic.otf
          style: italic
        - asset: Fonts/OTF/Satoshi-BoldItalic.otf
          weight: 700
          style: italic
        - asset: Fonts/OTF/Satoshi-BlackItalic.otf
          weight: 900
          style: italic
        - asset: Fonts/OTF/Satoshi-LightItalic.otf
          weight: 300
          style: italic
        - asset: Fonts/OTF/Satoshi-MediumItalic.otf
          weight: 500
          style: italic