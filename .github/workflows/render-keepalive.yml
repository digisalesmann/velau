name: Render keepalive

on:
  schedule:
    # Every 5 minutes — Render's free tier spins down after 15 min with no
    # inbound traffic, which kills the in-process trading bot loop.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        env:
          APP_URL: https://velau.onrender.com/
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL")
          echo "Render responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "Unexpected status code, failing job so GitHub notifies via email."
            exit 1
          fi
